<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .stat-card {
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .maid-card {
            transition: all 0.3s;
        }
        .maid-card:hover {
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
<!-- Top Navigation -->
<nav class="bg-white shadow-lg">
    <div class="container mx-auto px-4">
        <div class="flex justify-between items-center h-16">
            <!-- Logo -->
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 text-white w-10 h-10 rounded-lg flex items-center justify-center font-bold text-xl">
                    MS
                </div>
                <div>
                    <div class="font-bold text-gray-800">MaidService</div>
                    <div class="text-xs text-gray-500">User Dashboard</div>
                </div>
            </div>

            <!-- User Menu -->
            <div class="flex items-center space-x-4">
                <button onclick="window.location.href='/search-maids.html'" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                    <i class="fas fa-search mr-2"></i>Find Maids
                </button>
                <div class="relative group">
                    <button class="flex items-center space-x-2">
                        <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
                            <i class="fas fa-user text-blue-600"></i>
                        </div>
                        <span id="userName" class="font-medium">User</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2 hidden group-hover:block z-10">
                        <a href="user-profile.html" class="block px-4 py-2 hover:bg-gray-100">
                            <i class="fas fa-user mr-2"></i>My Profile
                        </a>
                        <a href="change-password.html" class="block px-4 py-2 hover:bg-gray-100">
                            <i class="fas fa-lock mr-2"></i>Change Password
                        </a>
                        <button onclick="logout()" class="block w-full text-left px-4 py-2 hover:bg-gray-100 text-red-600">
                            <i class="fas fa-sign-out-alt mr-2"></i>Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container mx-auto px-4 py-8">
    <!-- Welcome Banner -->
    <div class="bg-gradient-to-r from-blue-600 to-blue-800 rounded-xl p-8 text-white mb-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold mb-2" id="welcomeMessage">Welcome back!</h1>
                <p class="text-blue-100">Find the best service providers for your home needs</p>
            </div>
            <div class="mt-4 md:mt-0">
                <button onclick="window.location.href='/search-maids.html'"
                        class="bg-white text-blue-600 px-6 py-3 rounded-lg font-semibold hover:bg-blue-50">
                    <i class="fas fa-search mr-2"></i>Search Service Providers
                </button>
            </div>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="stat-card bg-white rounded-xl shadow-md p-6">
            <div class="flex items-center">
                <div class="bg-blue-100 p-3 rounded-lg mr-4">
                    <i class="fas fa-users text-blue-600 text-2xl"></i>
                </div>
                <div>
                    <p class="text-gray-600">Available Service Providers</p>
                    <p class="text-3xl font-bold" id="availableMaids">0</p>
                </div>
            </div>
        </div>

        <div class="stat-card bg-white rounded-xl shadow-md p-6">
            <div class="flex items-center">
                <div class="bg-green-100 p-3 rounded-lg mr-4">
                    <i class="fas fa-calendar-check text-green-600 text-2xl"></i>
                </div>
                <div>
                    <p class="text-gray-600">Your Bookings</p>
                    <p class="text-3xl font-bold" id="totalBookings">0</p>
                </div>
            </div>
        </div>

        <div class="stat-card bg-white rounded-xl shadow-md p-6">
            <div class="flex items-center">
                <div class="bg-purple-100 p-3 rounded-lg mr-4">
                    <i class="fas fa-star text-purple-600 text-2xl"></i>
                </div>
                <div>
                    <p class="text-gray-600">Service Types</p>
                    <p class="text-3xl font-bold">10+</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="bg-white rounded-xl shadow-md p-6 mb-8">
        <h2 class="text-xl font-bold text-gray-800 mb-6">Quick Actions</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <button onclick="searchByService('CLEANING')"
                    class="bg-blue-50 border-2 border-blue-100 rounded-lg p-4 text-center hover:bg-blue-100 transition-colors">
                <div class="text-3xl mb-3">🧹</div>
                <p class="font-medium">Find Cleaner</p>
            </button>

            <button onclick="searchByService('ELECTRICIAN')"
                    class="bg-blue-50 border-2 border-blue-100 rounded-lg p-4 text-center hover:bg-blue-100 transition-colors">
                <div class="text-3xl mb-3">🔧</div>
                <p class="font-medium">Find Electrician</p>
            </button>

            <button onclick="searchByService('PLUMBER')"
                    class="bg-blue-50 border-2 border-blue-100 rounded-lg p-4 text-center hover:bg-blue-100 transition-colors">
                <div class="text-3xl mb-3">🚰</div>
                <p class="font-medium">Find Plumber</p>
            </button>

            <button onclick="searchByService('COOK')"
                    class="bg-blue-50 border-2 border-blue-100 rounded-lg p-4 text-center hover:bg-blue-100 transition-colors">
                <div class="text-3xl mb-3">👨‍🍳</div>
                <p class="font-medium">Find Cook</p>
            </button>
        </div>
    </div>

    <!-- Available Service Providers -->
    <div class="bg-white rounded-xl shadow-md p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-gray-800">Available Service Providers</h2>
            <button onclick="window.location.href='/search-maids.html'"
                    class="text-blue-600 hover:text-blue-800 font-medium">
                View All <i class="fas fa-arrow-right ml-1"></i>
            </button>
        </div>

        <div id="maidsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Maids will be loaded here dynamically -->
            <div class="text-center py-12 text-gray-500">
                <div class="text-5xl mb-4">👷</div>
                <p>Loading service providers...</p>
            </div>
        </div>
    </div>
</div>

<!-- JavaScript -->
<script>
    const API_BASE = 'http://localhost:8080/api';
    const token = localStorage.getItem('token');
    const userType = localStorage.getItem('userType');

    // Check if user is logged in
    if (!token || userType !== 'USER') {
        alert('Please login as user first');
        window.location.href = '/login.html';
    }

    // Load user data on page load
    document.addEventListener('DOMContentLoaded', function() {
        loadUserProfile();
        loadAvailableMaids();
    });

    async function loadUserProfile() {
        try {
            // First validate token
            const validateResponse = await fetch(API_BASE + '/auth/validate-token', {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!validateResponse.ok) {
                throw new Error('Invalid session');
            }

            // Get user data (you'll need to implement this endpoint)
            // For now, show welcome message
            const userName = localStorage.getItem('userName') || 'User';
            document.getElementById('welcomeMessage').textContent = `Welcome back, ${userName}!`;
            document.getElementById('userName').textContent = userName;

        } catch (error) {
            console.error('Error loading profile:', error);
            alert('Session expired. Please login again.');
            logout();
        }
    }

    async function loadAvailableMaids() {
        try {
            const response = await fetch(API_BASE + '/users/search-maids/active');
            if (response.ok) {
                const maids = await response.json();
                displayMaids(maids.slice(0, 6)); // Show first 6 maids
                document.getElementById('availableMaids').textContent = maids.length;
            }
        } catch (error) {
            console.error('Error loading maids:', error);
            document.getElementById('maidsList').innerHTML = `
                <div class="text-center py-12 text-gray-500 col-span-3">
                    <div class="text-5xl mb-4">⚠️</div>
                    <p>Unable to load service providers</p>
                    <button onclick="loadAvailableMaids()" class="mt-4 text-blue-600 hover:underline">
                        Try Again
                    </button>
                </div>
            `;
        }
    }

    function displayMaids(maids) {
        const maidsList = document.getElementById('maidsList');

        if (!maids || maids.length === 0) {
            maidsList.innerHTML = `
                <div class="text-center py-12 text-gray-500 col-span-3">
                    <div class="text-5xl mb-4">👷</div>
                    <p>No service providers available at the moment</p>
                    <button onclick="window.location.href='/search-maids.html'" class="mt-4 text-blue-600 hover:underline">
                        Search in other areas
                    </button>
                </div>
            `;
            return;
        }

        maidsList.innerHTML = maids.map(maid => `
            <div class="maid-card border rounded-xl p-5 hover:shadow-xl transition-all">
                <div class="flex items-start mb-4">
                    <div class="bg-blue-100 p-3 rounded-lg mr-4">
                        <span class="text-2xl">${getServiceIcon(maid.serviceType)}</span>
                    </div>
                    <div class="flex-grow">
                        <h3 class="font-bold text-lg">${maid.name}</h3>
                        <p class="text-gray-600 text-sm capitalize">
                            ${maid.serviceType ? maid.serviceType.toLowerCase().replace('_', ' ') : 'Service Provider'}
                        </p>
                    </div>
                </div>

                <div class="space-y-2 mb-4">
                    <div class="flex items-center text-sm">
                        <i class="fas fa-map-marker-alt text-gray-400 w-5"></i>
                        <span class="ml-2">${maid.city || 'Location not specified'}</span>
                    </div>
                    <div class="flex items-center text-sm">
                        <i class="fas fa-rupee-sign text-gray-400 w-5"></i>
                        <span class="ml-2">₹${maid.hourlyRate || 'Negotiable'}/hour</span>
                    </div>
                    <div class="flex items-center text-sm">
                        <i class="fas fa-briefcase text-gray-400 w-5"></i>
                        <span class="ml-2">${maid.experience || 0} years experience</span>
                    </div>
                </div>

                <div class="flex justify-between items-center">
                    <span class="px-3 py-1 rounded-full text-xs font-medium ${getStatusClass(maid.status)}">
                        ${maid.status || 'ACTIVE'}
                    </span>
                    <button onclick="viewMaidProfile(${maid.id})"
                            class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">
                        View Profile
                    </button>
                </div>
            </div>
        `).join('');
    }

    function getServiceIcon(serviceType) {
        const icons = {
            'CLEANING': '🧹',
            'ELECTRICIAN': '🔧',
            'AC_REPAIR': '❄️',
            'PLUMBER': '🚰',
            'CARPENTER': '🪚',
            'PAINTER': '🎨',
            'GARDENER': '🌿',
            'COOK': '👨‍🍳',
            'DRIVER': '🚗',
            'OTHER': '👷'
        };
        return icons[serviceType] || '👷';
    }

    function getStatusClass(status) {
        switch(status) {
            case 'ACTIVE': return 'bg-green-100 text-green-800';
            case 'PENDING': return 'bg-yellow-100 text-yellow-800';
            case 'INACTIVE': return 'bg-red-100 text-red-800';
            default: return 'bg-gray-100 text-gray-800';
        }
    }

    function searchByService(serviceType) {
        window.location.href = `/search-maids.html?service=${serviceType}`;
    }

    function viewMaidProfile(maidId) {
        window.location.href = `/maid-profile.html?id=${maidId}`;
    }

    function logout() {
        if (token) {
            fetch(API_BASE + '/auth/logout', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            }).catch(() => {
                // Ignore errors during logout
            });
        }

        localStorage.removeItem('token');
        localStorage.removeItem('userType');
        localStorage.removeItem('userName');

        window.location.href = '/login.html';
    }
</script>
</body>
</html>
