<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration - My Maid</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
<!-- Navbar -->
<nav class="bg-white shadow">
    <div class="container mx-auto px-4 py-3">
        <a href="index.html" class="text-blue-600 hover:text-blue-800">
            <i class="fas fa-arrow-left mr-2"></i>Back to Home
        </a>
    </div>
</nav>

<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8">
        <div class="text-center mb-6">
            <i class="fas fa-user-plus text-blue-600 text-4xl mb-4"></i>
            <h1 class="text-2xl font-bold">User Registration</h1>
            <p class="text-gray-600">Create your account to book services</p>
        </div>

        <form id="registerForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700 mb-2">Full Name *</label>
                    <input type="text" id="fullName"
                           class="w-full border rounded-lg px-4 py-2"
                           placeholder="Enter your full name" required>
                </div>

                <div>
                    <label class="block text-gray-700 mb-2">Mobile Number *</label>
                    <div class="flex">
                        <span class="bg-gray-100 border border-r-0 rounded-l-lg px-3 py-2">+91</span>
                        <input type="tel" id="mobile" maxlength="10"
                               class="flex-1 border rounded-r-lg px-3 py-2"
                               placeholder="9876543210" required>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700 mb-2">Email Address</label>
                    <input type="email" id="email"
                           class="w-full border rounded-lg px-4 py-2"
                           placeholder="your@email.com">
                </div>

                <div>
                    <label class="block text-gray-700 mb-2">Address *</label>
                    <input type="text" id="address"
                           class="w-full border rounded-lg px-4 py-2"
                           placeholder="Your complete address" required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700 mb-2">Password *</label>
                    <input type="password" id="password"
                           class="w-full border rounded-lg px-4 py-2"
                           placeholder="Enter password" required>
                </div>

                <div>
                    <label class="block text-gray-700 mb-2">Confirm Password *</label>
                    <input type="password" id="confirmPassword"
                           class="w-full border rounded-lg px-4 py-2"
                           placeholder="Re-enter password" required>
                </div>
            </div>

            <div class="mt-6">
                <button type="submit"
                        class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700">
                    Register Now
                </button>
            </div>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-200 text-center">
            <p class="text-gray-600">
                Already have an account?
                <a href="login.html" class="text-blue-600 font-medium hover:underline">
                    Login here
                </a>
            </p>
            <p class="mt-2">
                <a href="maid-register.html" class="text-green-600 hover:underline">
                    Want to work as a service provider? Register here
                </a>
            </p>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:8080/api';

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        // Get form data
        const userData = {
            fullName: document.getElementById('fullName').value,
            mobile: document.getElementById('mobile').value,
            email: document.getElementById('email').value || null,
            address: document.getElementById('address').value,
            password: document.getElementById('password').value,
            confirmPassword: document.getElementById('confirmPassword').value
        };

        // Validate passwords match
        if (userData.password !== userData.confirmPassword) {
            alert('Passwords do not match!');
            return;
        }

        // Remove confirmPassword before sending (backend doesn't need it)
        delete userData.confirmPassword;

        try {
            // Show loading
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Registering...';
            submitBtn.disabled = true;

            console.log('Sending user data:', userData);

            const response = await fetch(API_BASE + '/users/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(userData)
            });

            console.log('Response status:', response.status);

            if (response.ok) {
                const data = await response.json();
                alert('✅ Registration successful! Please login.');
                window.location.href = 'login.html';
            } else {
                const errorText = await response.text();
                let errorMessage = 'Registration failed';

                try {
                    const errorData = JSON.parse(errorText);
                    errorMessage = errorData.message || errorData.error || errorMessage;
                } catch (e) {
                    // If not JSON, use text
                    errorMessage = errorText || errorMessage;
                }

                alert('❌ Error: ' + errorMessage);
            }

        } catch (error) {
            console.error('Registration error:', error);
            alert('❌ Network error: ' + error.message);
        } finally {
            // Reset button
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.innerHTML = 'Register Now';
            submitBtn.disabled = false;
        }
    });
</script>
</body>
</html>
