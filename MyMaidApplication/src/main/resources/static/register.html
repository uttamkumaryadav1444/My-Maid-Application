<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration - Fixed</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .form-card { box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1); }
        .input-field:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
<nav class="bg-white shadow">
    <div class="container mx-auto px-4 py-3">
        <a href="index.html" class="text-blue-600 hover:text-blue-800">
            <i class="fas fa-arrow-left mr-2"></i>Back to Home
        </a>
    </div>
</nav>

<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto bg-white form-card rounded-2xl p-8">
        <div class="text-center mb-8">
            <i class="fas fa-user-plus text-blue-600 text-4xl mb-4"></i>
            <h1 class="text-3xl font-bold">User Registration - FIXED</h1>
            <p class="text-gray-600 mt-2">Working registration form with confirmPassword</p>
        </div>

        <form id="registerForm" class="space-y-6">
            <div>
                <label class="block text-gray-700 mb-2 font-medium">Full Name *</label>
                <input type="text" id="fullName" required
                       class="w-full px-4 py-3 border rounded-lg input-field"
                       placeholder="Enter your full name">
            </div>

            <div>
                <label class="block text-gray-700 mb-2 font-medium">Mobile Number *</label>
                <div class="flex">
                    <span class="bg-gray-100 border border-r-0 rounded-l-lg px-3 py-3">+91</span>
                    <input type="tel" id="mobile" maxlength="10" required
                           class="flex-1 border rounded-r-lg px-4 py-3 input-field"
                           placeholder="9876543210">
                </div>
            </div>

            <div>
                <label class="block text-gray-700 mb-2 font-medium">Email Address</label>
                <input type="email" id="email"
                       class="w-full px-4 py-3 border rounded-lg input-field"
                       placeholder="your@email.com">
            </div>

            <div>
                <label class="block text-gray-700 mb-2 font-medium">Address *</label>
                <input type="text" id="address" required
                       class="w-full px-4 py-3 border rounded-lg input-field"
                       placeholder="Complete address">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-gray-700 mb-2 font-medium">Password *</label>
                    <input type="password" id="password" required
                           class="w-full px-4 py-3 border rounded-lg input-field"
                           placeholder="Enter password">
                </div>

                <div>
                    <label class="block text-gray-700 mb-2 font-medium">Confirm Password *</label>
                    <input type="password" id="confirmPassword" required
                           class="w-full px-4 py-3 border rounded-lg input-field"
                           placeholder="Confirm password">
                </div>
            </div>

            <div class="mt-8">
                <button type="submit"
                        class="w-full bg-blue-600 text-white py-4 rounded-lg font-medium text-lg hover:bg-blue-700">
                    Register Now
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    const API_BASE = '/api';

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        // Get form values
        const userData = {
            fullName: document.getElementById('fullName').value.trim(),
            mobile: document.getElementById('mobile').value.trim(),
            email: document.getElementById('email').value.trim() || null,
            address: document.getElementById('address').value.trim(),
            password: document.getElementById('password').value,
            confirmPassword: document.getElementById('confirmPassword').value  // REQUIRED FIELD
        };

        // Validate passwords match
        if (userData.password !== userData.confirmPassword) {
            alert('Passwords do not match!');
            return;
        }

        // DO NOT DELETE confirmPassword - backend needs it
        // delete userData.confirmPassword;  // DON'T DO THIS

        console.log('Sending data:', userData);

        try {
            const response = await fetch(API_BASE + '/users/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(userData)
            });

            const result = await response.json();

            if (response.ok) {
                alert('✅ Registration successful!');
                window.location.href = 'login.html';
            } else {
                alert('❌ Error: ' + (result.message || 'Registration failed'));
            }

        } catch (error) {
            console.error('Error:', error);
            alert('Network error: ' + error.message);
        }
    });
</script>
</body>
</html>
